<!DOCTYPE html>

<body>

  <!-- Loading -->

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>Finding nearby hats...</p>
  </div>

  <!-- Top Bar -->

  <div class="top-bar">

    <h1>Dhaka Poshur Hat Finder</h1>

    <button id="findNearbyBtn">
      Find Nearby Hats
    </button>

  </div>

  <!-- Map -->

  <div id="map"></div>

  <!-- Recenter Button -->

  <button id="recenterBtn">
    📍
  </button>

  <!-- Nearby Panel -->

  <div id="nearbyPanel" class="nearby-panel">

    <div class="panel-header">

      <h3 id="nearbyTitle">
        Nearby Hats
      </h3>

      <button id="togglePanelBtn">−</button>

    </div>

    <div id="nearbyList">

      <p>Click "Find Nearby Hats"</p>

    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

  <script src="script.js"></script>

</body>

</html>
